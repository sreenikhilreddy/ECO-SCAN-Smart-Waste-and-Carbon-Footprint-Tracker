<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoScan | Secure Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #ff00ff;
            --bg-dark: #0a0a12;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* Animated Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .main-wrapper {
            display: flex;
            width: 90%;
            max-width: 1100px;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
            z-index: 1;
        }

        /* Hero Section */
        .hero-section {
            flex: 1;
            text-align: left;
        }

        .hero-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            letter-spacing: 4px;
            line-height: 1;
            margin-bottom: 10px;
        }

        .hero-sub {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Login Card */
        .login-container {
            width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 0 20px rgba(255, 255, 255, 0.02);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 14px;
            color: #888;
            margin-bottom: 35px;
        }

        /* Input Styling */
        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 204, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: var(--primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .input-box input::placeholder {
            color: rgba(0, 255, 204, 0.4);
        }

        /* Button Styling */
        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--secondary), #7000ff);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(255, 0, 255, 0.3);
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 0, 255, 0.5);
            filter: brightness(1.2);
        }

        .signup {
            margin-top: 25px;
            font-size: 14px;
            color: #aaa;
        }

        .signup a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .signup a:hover {
            color: var(--secondary);
            text-shadow: 0 0 10px var(--secondary);
        }

        /* Mobile Responsive */
        @media (max-width: 850px) {
            .main-wrapper {
                flex-direction: column;
                text-align: center;
                justify-content: center;
            }
            .hero-section {
                text-align: center;
            }
            .login-container {
                width: 100%;
                max-width: 380px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="main-wrapper">
        <div class="hero-section">
            <h1 class="hero-text">EcoScan 🌐</h1>
            <p class="hero-sub">Sustainability through Intelligence</p>
        </div>

        <div class="login-container">
            <h2>LOGIN</h2>
            <p class="tagline">Enter your credentials to continue</p>

            <form action="index.html">
                <div class="input-box">
                    <input type="email" placeholder="Email Address" required>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                </div>

                <button class="login-btn" type="submit">Initialize Login</button>
            </form>

            <div class="signup">
                New to the ecosystem? <a href="#">Create Account</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 60;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    color: Math.random() > 0.5 ? '#00ffcc' : '#ff00ff'
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = 0.3;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
